<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>时光轴 · 自动生成影集</title>
    <link rel="stylesheet" href="assets/fontawesome/css/all.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="toolbar">
        <button id="themeToggle" class="btn-icon"><i class="fas fa-moon"></i> 暗色模式</button>
        <!-- 如果还有其他按钮可以放在这里 -->
    </div>
    <div class="container">
        <div class="hero">
            <h1><i class="fas fa-images"></i> 时光轴 · 智能影集</h1>
            <div class="sub">照片自动按拍摄时间排序</div>
            <p>运行 `node generate-photos.js` 即可根据 images 文件夹内的照片生成配置。</p>
        </div>
        <div id="timelineContainer" class="timeline">
            <div class="empty-state"><i class="far fa-images"></i><p>加载中...</p></div>
        </div>
        <div class="footer">照片来自本地，按 EXIF 拍摄时间排序</div>
    </div>
    <div id="lightbox" class="lightbox-modal">
        <div class="close-lightbox" id="closeLightboxBtn">&times;</div>
        <div class="lightbox-content"><img id="lightboxImg" src="" alt="放大预览"></div>
        <div id="lightboxCaption" class="lightbox-caption"></div>
    </div>
    <script src="js/script.js"></script>
</body>
</html>
